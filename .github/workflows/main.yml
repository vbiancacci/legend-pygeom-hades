name: pygeomhades

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - "releases/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_COLOR: 3

jobs:
  build-and-test:
    name: Test pygeomhades with Python
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        os: [ubuntu-latest, macOS-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install non-python (homebrew) dependencies
        if: ${{ matrix.os == 'macOS-latest' }}
        run: |
          brew update
          brew install opencascade cgal gmp mpfr boost

      - name: Get dependencies and install pygeomhades
        run: |
          python -m pip install --upgrade pip wheel setuptools
          python -m pip install --upgrade .[test]

      - name: Run unit tests with public geometry
        run: |
          python -m pytest -vvv

      - name: Setup LEGEND/HADES metadata
        # secrets are not available in PRs from forks, so do not even attempt to clone metadata.
        if:
          ${{ github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.owner.login == 'legend-exp' }}
        uses: ./.github/actions/setup-legend-hades-metadata
        with:
          token: ${{ secrets.CLONE_LEGEND_METADATA }}

      - name: Run unit tests with full private metadata
        run: |
          python -m pytest -vvv

  test-remage:
    name: Test legend-pygeom-hades with remage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Pixi
        uses: prefix-dev/setup-pixi@v0.9.3
        with:
          environments: test

      - name: Run tests with public geometry
        run: |
          pixi run -e test pytest -vvv --runxfail -m needs_remage

      - name: Setup LEGEND/HADES metadata
        # secrets are not available in PRs from forks, so do not even attempt to clone metadata.
        if:
          ${{ github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.owner.login == 'legend-exp' }}
        uses: ./.github/actions/setup-legend-hades-metadata
        with:
          token: ${{ secrets.CLONE_LEGEND_METADATA }}

      - name: Run tests with full private metadata
        run: |
          pixi run -e test pytest -vvv --runxfail -m needs_remage

  test-coverage:
    name: Calculate and upload test coverage
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup LEGEND/HADES metadata
        # secrets are not available in PRs from forks, so do not even attempt to clone metadata.
        if:
          ${{ github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.owner.login == 'legend-exp' }}
        uses: ./.github/actions/setup-legend-hades-metadata
        with:
          token: ${{ secrets.CLONE_LEGEND_METADATA }}

      - name: Generate Report
        run: |
          python -m pip install --upgrade pip wheel setuptools
          python -m pip install --upgrade .[test]
          python -m pytest --cov=pygeomhades --cov-report=xml

      - name: Upload Coverage to codecov.io
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  build-docs:
    name: Build documentation
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup LEGEND/HADES metadata
        # secrets are not available in PRs from forks, so do not even attempt to clone metadata.
        if:
          ${{ github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.owner.login == 'legend-exp' }}
        uses: ./.github/actions/setup-legend-hades-metadata
        with:
          token: ${{ secrets.CLONE_LEGEND_METADATA }}

      - name: Setup build environment
        run: |
          python -m pip install --upgrade pip wheel setuptools
          python -m pip install --upgrade .[docs]

      - name: Build docs for current ref
        run: |
          cd docs
          make clean
          make
